services:
  postgres:
    image: postgres:16-alpine
    container_name: network_route_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: network_route
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d network_route"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
